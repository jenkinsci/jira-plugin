_extends: github:jenkinsci/.github:/.github/release-drafter.yml
name-template: $RESOLVED_VERSION
tag-template: jira-$RESOLVED_VERSION

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'dependencies'
  patch:
    labels:
      - 'bugfix'
      - 'patch'
  default: minor
